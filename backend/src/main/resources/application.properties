spring.application.name=backend

# Database connection
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/finance_advisor_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:dikshita}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server port
server.port=${PORT:8080}

# AI Service
ai.service.url=${AI_SERVICE_URL:http://localhost:8000}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}